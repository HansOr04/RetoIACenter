services:

  postgres:
    image: postgres:16-alpine
    container_name: cotizador-postgres
    environment:
      POSTGRES_DB: cotizador
      POSTGRES_USER: cotizador
      POSTGRES_PASSWORD: cotizador
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cotizador -d cotizador"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cotizador-net

  core-stub:
    build:
      context: ./apps/core-stub
      dockerfile: Dockerfile
    container_name: cotizador-core-stub
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cotizador-net

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cotizador-api
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/cotizador
      DB_USER: cotizador
      DB_PASS: cotizador
      CORE_STUB_URL: http://core-stub:4000
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      core-stub:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - cotizador-net

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: cotizador-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_CORE_URL: http://localhost:4000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cotizador-net

volumes:
  postgres_data:
    driver: local

networks:
  cotizador-net:
    driver: bridge
